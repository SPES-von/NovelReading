spring:
  datasource:
    url: jdbc:h2:mem:novel_reading_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        globally_quoted_identifiers: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

server:
  servlet:
    context-path: /api

jwt:
  secret: novel-reading-jwt-secret-key-for-tests-please-change-if-needed
  expiration: 86400000

baidu:
  speech:
    app-id: test
    api-key: test
    secret-key: test

